<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>SMS</h2>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="students.html" class="nav-link">Students</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="grades.html" class="nav-link">Grades</a></li>
        <li><a href="attendance.html" class="nav-link">Attendance</a></li>
        <li><a href="reports.html" class="nav-link active">Reports</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Reports & Analytics</h1>
        </div>
      </header>

      <div class="content-area">
        <div class="tabs">
          <button class="tab-btn active" data-tab="student-report">Student Report Card</button>
          <button class="tab-btn" data-tab="class-analytics">Class Analytics</button>
          <button class="tab-btn" data-tab="all-students">All Students Summary</button>
        </div>

        <!-- Student Report Card Tab -->
        <div id="student-report" class="tab-content active">
          <div class="container">
            <div class="filter-bar">
              <select id="studentSelect" class="search-input">
                <option value="">Select a student</option>
              </select>
              <button onclick="generateStudentReport()" class="btn-primary">Generate Report</button>
            </div>
            <div id="studentReportContent"></div>
          </div>
        </div>

        <!-- Class Analytics Tab -->
        <div id="class-analytics" class="tab-content">
          <div class="container">
            <div class="filter-bar">
              <select id="courseSelect" class="search-input">
                <option value="">Select a course</option>
              </select>
              <button onclick="generateClassAnalytics()" class="btn-primary">Generate Analytics</button>
            </div>
            <div id="classAnalyticsContent"></div>
          </div>
        </div>

        <!-- All Students Summary Tab -->
        <div id="all-students" class="tab-content">
          <div class="container">
            <button onclick="generateAllStudentsReport()" class="btn-primary">Generate Report</button>
            <div id="allStudentsContent"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    let students = [];
    let courses = [];

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadStudents();
      loadCourses();
      setupTabs();
    });

    async function loadStudents() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
        students = await res.json();
        populateStudentSelect();
      } catch (error) {
        console.error('Error loading students:', error);
      }
    }

    async function loadCourses() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/courses', { headers: { 'Authorization': `Bearer ${token}` } });
        courses = await res.json();
        populateCourseSelect();
      } catch (error) {
        console.error('Error loading courses:', error);
      }
    }

    function populateStudentSelect() {
      const select = document.getElementById('studentSelect');
      select.innerHTML = '<option value="">Select a student</option>' +
        students.map(s => `<option value="${s.id}">${s.first_name} ${s.last_name}</option>`).join('');
    }

    function populateCourseSelect() {
      const select = document.getElementById('courseSelect');
      select.innerHTML = '<option value="">Select a course</option>' +
        courses.map(c => `<option value="${c.id}">${c.course_code} - ${c.course_name}</option>`).join('');
    }

    async function generateStudentReport() {
      const studentId = document.getElementById('studentSelect').value;
      if (!studentId) {
        alert('Please select a student');
        return;
      }

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/reports/student/${studentId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const report = await res.json();

        const attendanceRes = await fetch(`/api/reports/attendance/${studentId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const attendance = await attendanceRes.json();

        const student = students.find(s => s.id == studentId);
        const html = `
          <div class="report-section">
            <h3>Student Information</h3>
            <p><strong>Name:</strong> ${student.first_name} ${student.last_name}</p>
            <p><strong>Student ID:</strong> ${student.student_id}</p>
            <p><strong>Email:</strong> ${student.email}</p>
            <p><strong>Enrollment Date:</strong> ${student.enrollment_date}</p>
          </div>

          <div class="report-section">
            <h3>Academic Performance</h3>
            <p><strong>Courses Enrolled:</strong> ${report.courses_enrolled || 0}</p>
            <p><strong>Overall GPA:</strong> <strong class="highlight">${(report.average_gpa || 0).toFixed(2)}</strong></p>
          </div>

          <div class="report-section">
            <h3>Attendance Summary</h3>
            <p><strong>Total Classes:</strong> ${attendance.total_classes}</p>
            <p><strong>Present:</strong> ${attendance.present_days}</p>
            <p><strong>Absent:</strong> ${attendance.absent_days}</p>
            <p><strong>Late:</strong> ${attendance.late_days}</p>
            <p><strong>Attendance Percentage:</strong> <strong class="highlight">${attendance.attendance_percentage}%</strong></p>
          </div>

          ${report.grades && report.grades.length > 0 ? `
            <div class="report-section">
              <h3>Course Grades</h3>
              <table class="data-table">
                <thead>
                  <tr><th>Course</th><th>GPA</th><th>Grade</th></tr>
                </thead>
                <tbody>
                  ${report.grades.map(g => `
                    <tr>
                      <td>${g.course_name}</td>
                      <td>${(g.gpa || 0).toFixed(2)}</td>
                      <td><span class="badge grade-${g.grade || 'F'}">${g.grade || 'N/A'}</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          ` : ''}
        `;
        document.getElementById('studentReportContent').innerHTML = html;
      } catch (error) {
        alert('Error generating report: ' + error.message);
      }
    }

    async function generateClassAnalytics() {
      const courseId = document.getElementById('courseSelect').value;
      if (!courseId) {
        alert('Please select a course');
        return;
      }

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/reports/class/${courseId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const analytics = await res.json();

        const course = courses.find(c => c.id == courseId);
        const html = `
          <div class="report-section">
            <h3>Course Information</h3>
            <p><strong>Code:</strong> ${course.course_code}</p>
            <p><strong>Name:</strong> ${course.course_name}</p>
            <p><strong>Instructor:</strong> ${course.instructor || 'N/A'}</p>
            <p><strong>Credits:</strong> ${course.credits}</p>
          </div>

          <div class="report-section">
            <h3>Class Performance</h3>
            <p><strong>Total Students:</strong> ${analytics.total_students}</p>
            <p><strong>Class Average GPA:</strong> <strong class="highlight">${(analytics.class_average_gpa || 0).toFixed(2)}</strong></p>
            <p><strong>Highest GPA:</strong> ${(analytics.highest_gpa || 0).toFixed(2)}</p>
            <p><strong>Lowest GPA:</strong> ${(analytics.lowest_gpa || 0).toFixed(2)}</p>
          </div>

          ${analytics.studentGrades && analytics.studentGrades.length > 0 ? `
            <div class="report-section">
              <h3>Student Grades Distribution</h3>
              <table class="data-table">
                <thead>
                  <tr><th>Student</th><th>GPA</th><th>Grade</th></tr>
                </thead>
                <tbody>
                  ${analytics.studentGrades.map(g => `
                    <tr>
                      <td>${g.first_name} ${g.last_name}</td>
                      <td>${(g.gpa || 0).toFixed(2)}</td>
                      <td><span class="badge grade-${g.grade || 'F'}">${g.grade || 'N/A'}</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          ` : ''}
        `;
        document.getElementById('classAnalyticsContent').innerHTML = html;
      } catch (error) {
        alert('Error generating analytics: ' + error.message);
      }
    }

    async function generateAllStudentsReport() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/reports/all-students', { headers: { 'Authorization': `Bearer ${token}` } });
        const report = await res.json();

        const html = `
          <div class="report-section">
            <h3>All Students Summary</h3>
            <table class="data-table">
              <thead>
                <tr><th>Student ID</th><th>Name</th><th>Email</th><th>Courses</th><th>Avg GPA</th></tr>
              </thead>
              <tbody>
                ${report.map(s => `
                  <tr>
                    <td>${s.student_id}</td>
                    <td>${s.first_name} ${s.last_name}</td>
                    <td>${s.email}</td>
                    <td>${s.courses_enrolled || 0}</td>
                    <td><strong>${(s.average_gpa || 0).toFixed(2)}</strong></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
        document.getElementById('allStudentsContent').innerHTML = html;
      } catch (error) {
        alert('Error generating report: ' + error.message);
      }
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

          btn.classList.add('active');
          const tabId = btn.dataset.tab;
          document.getElementById(tabId).classList.add('active');
        });
      });
    }
  </script>
</body>
</html>
