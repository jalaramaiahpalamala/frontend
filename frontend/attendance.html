<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>SMS</h2>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="students.html" class="nav-link">Students</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="grades.html" class="nav-link">Grades</a></li>
        <li><a href="attendance.html" class="nav-link active">Attendance</a></li>
        <li><a href="reports.html" class="nav-link">Reports</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Attendance Management</h1>
        </div>
        <div class="top-bar-right">
          <button id="addAttendanceBtn" class="btn-primary">+ Mark Attendance</button>
        </div>
      </header>

      <div class="content-area">
        <div id="attendanceForm" class="modal" style="display: none;">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="formTitle">Mark Attendance</h2>
            <form id="attendanceFormElement">
              <div class="form-row">
                <div class="form-group">
                  <label for="studentSelect">Student</label>
                  <select id="studentSelect" name="student_id" required>
                    <option value="">Select a student</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="courseSelect">Course</label>
                  <select id="courseSelect" name="course_id" required>
                    <option value="">Select a course</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="attendanceDate">Date</label>
                  <input type="date" id="attendanceDate" name="attendance_date" required>
                </div>
                <div class="form-group">
                  <label for="status">Status</label>
                  <select id="status" name="status" required>
                    <option value="">Select status</option>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Late">Late</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" rows="2"></textarea>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn-primary">Save Attendance</button>
                <button type="button" class="btn-secondary cancel-btn">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <div class="container">
          <div class="filter-bar">
            <input type="date" id="dateFilter" class="search-input">
            <select id="courseFilter" class="search-input">
              <option value="">All Courses</option>
            </select>
            <select id="statusFilter" class="search-input">
              <option value="">All Status</option>
              <option value="Present">Present</option>
              <option value="Absent">Absent</option>
              <option value="Late">Late</option>
            </select>
          </div>
          <table id="attendanceTable" class="data-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Course</th>
                <th>Date</th>
                <th>Status</th>
                <th>Remarks</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="attendanceList">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    let allAttendance = [];
    let students = [];
    let courses = [];

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadStudents();
      loadCourses();
      loadAttendance();
      setupFormHandlers();
    });

    async function loadStudents() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
        students = await res.json();
        populateDropdowns();
      } catch (error) {
        console.error('Error loading students:', error);
      }
    }

    async function loadCourses() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/courses', { headers: { 'Authorization': `Bearer ${token}` } });
        courses = await res.json();
        populateDropdowns();
      } catch (error) {
        console.error('Error loading courses:', error);
      }
    }

    function populateDropdowns() {
      const studentSelect = document.getElementById('studentSelect');
      const courseSelect = document.getElementById('courseSelect');
      const courseFilter = document.getElementById('courseFilter');

      studentSelect.innerHTML = '<option value="">Select a student</option>' +
        students.map(s => `<option value="${s.id}">${s.first_name} ${s.last_name}</option>`).join('');

      courseSelect.innerHTML = '<option value="">Select a course</option>' +
        courses.map(c => `<option value="${c.id}">${c.course_code} - ${c.course_name}</option>`).join('');

      courseFilter.innerHTML = '<option value="">All Courses</option>' +
        courses.map(c => `<option value="${c.id}">${c.course_code} - ${c.course_name}</option>`).join('');
    }

    async function loadAttendance() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/attendance', { headers: { 'Authorization': `Bearer ${token}` } });
        allAttendance = await res.json();
        renderAttendance(allAttendance);
      } catch (error) {
        console.error('Error loading attendance:', error);
        document.getElementById('attendanceList').innerHTML = '<tr><td colspan="6">Error loading attendance</td></tr>';
      }
    }

    function renderAttendance(attendance) {
      const tbody = document.getElementById('attendanceList');
      tbody.innerHTML = attendance.map(a => `
        <tr>
          <td>${a.first_name} ${a.last_name}</td>
          <td>${a.course_name}</td>
          <td>${a.attendance_date}</td>
          <td><span class="badge status-${a.status.toLowerCase()}">${a.status}</span></td>
          <td>${a.remarks || '-'}</td>
          <td>
            <button onclick="editAttendance(${a.id})" class="btn-small">Edit</button>
            <button onclick="deleteAttendance(${a.id})" class="btn-small btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function setupFormHandlers() {
      const modal = document.getElementById('attendanceForm');
      const addBtn = document.getElementById('addAttendanceBtn');
      const closeBtn = document.querySelector('.close');
      const cancelBtn = document.querySelector('.cancel-btn');
      const form = document.getElementById('attendanceFormElement');

      addBtn.addEventListener('click', () => {
        document.getElementById('formTitle').textContent = 'Mark Attendance';
        form.reset();
        form.dataset.attendanceId = '';
        document.getElementById('attendanceDate').valueAsDate = new Date();
        modal.style.display = 'block';
      });

      closeBtn.addEventListener('click', () => modal.style.display = 'none');
      cancelBtn.addEventListener('click', () => modal.style.display = 'none');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('token');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        const attendanceId = form.dataset.attendanceId;

        try {
          const method = attendanceId ? 'PUT' : 'POST';
          const url = attendanceId ? `/api/attendance/${attendanceId}` : '/api/attendance';
          const res = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (!res.ok) throw new Error('Failed to save attendance');
          modal.style.display = 'none';
          loadAttendance();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      });
    }

    async function editAttendance(id) {
      const attendance = allAttendance.find(a => a.id === id);
      if (!attendance) return;

      document.getElementById('formTitle').textContent = 'Edit Attendance';
      document.getElementById('studentSelect').value = attendance.student_id;
      document.getElementById('courseSelect').value = attendance.course_id;
      document.getElementById('attendanceDate').value = attendance.attendance_date;
      document.getElementById('status').value = attendance.status;
      document.getElementById('remarks').value = attendance.remarks || '';

      document.getElementById('attendanceFormElement').dataset.attendanceId = id;
      document.getElementById('attendanceForm').style.display = 'block';
    }

    async function deleteAttendance(id) {
      if (!confirm('Are you sure you want to delete this attendance record?')) return;

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/attendance/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to delete attendance');
        loadAttendance();
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    document.getElementById('dateFilter').addEventListener('change', () => filterAttendance());
    document.getElementById('courseFilter').addEventListener('change', () => filterAttendance());
    document.getElementById('statusFilter').addEventListener('change', () => filterAttendance());

    function filterAttendance() {
      const date = document.getElementById('dateFilter').value;
      const courseId = document.getElementById('courseFilter').value;
      const status = document.getElementById('statusFilter').value;

      let filtered = allAttendance;
      if (date) filtered = filtered.filter(a => a.attendance_date === date);
      if (courseId) filtered = filtered.filter(a => a.course_id == courseId);
      if (status) filtered = filtered.filter(a => a.status === status);

      renderAttendance(filtered);
    }
  </script>
</body>
</html>
