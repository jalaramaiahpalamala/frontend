<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>SMS</h2>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
        <li><a href="students.html" class="nav-link">Students</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="grades.html" class="nav-link">Grades</a></li>
        <li><a href="attendance.html" class="nav-link">Attendance</a></li>
        <li><a href="reports.html" class="nav-link">Reports</a></li>
        <li id="adminMenuLink" style="display: none;"><a href="users.html" class="nav-link">Users</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Dashboard</h1>
        </div>
        <div class="top-bar-right">
          <span id="userName">User</span>
        </div>
      </header>

      <div class="content-area">
        <div class="dashboard-grid">
          <div class="stat-card">
            <h3>Total Students</h3>
            <p id="totalStudents" class="stat-number">0</p>
          </div>
          <div class="stat-card">
            <h3>Total Courses</h3>
            <p id="totalCourses" class="stat-number">0</p>
          </div>
          <div class="stat-card">
            <h3>Class Average GPA</h3>
            <p id="avgGPA" class="stat-number">0.0</p>
          </div>
          <div class="stat-card">
            <h3>Active Enrollments</h3>
            <p id="activeEnrollments" class="stat-number">0</p>
          </div>
        </div>

        <div class="container">
          <h2>Recent Activity</h2>
          <div id="recentActivityTable">
            <p>Loading...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadDashboard);

    async function loadDashboard() {
      checkAuth();
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user'));
      document.getElementById('userName').textContent = user.name;

      // Show Users link for admins
      if (user.role === 'admin') {
        document.getElementById('adminMenuLink').style.display = 'block';
      }

      try {
        // Load stats
        const studentsRes = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
        const coursesRes = await fetch('/api/courses', { headers: { 'Authorization': `Bearer ${token}` } });
        const gradesRes = await fetch('/api/grades', { headers: { 'Authorization': `Bearer ${token}` } });

        const students = await studentsRes.json();
        const courses = await coursesRes.json();
        const grades = await gradesRes.json();

        document.getElementById('totalStudents').textContent = students.length;
        document.getElementById('totalCourses').textContent = courses.length;
        document.getElementById('activeEnrollments').textContent = students.filter(s => s.status === 'active').length;

        const avgGPA = grades.length > 0 ? (grades.reduce((sum, g) => sum + (g.gpa || 0), 0) / grades.length).toFixed(2) : '0.0';
        document.getElementById('avgGPA').textContent = avgGPA;

        // Load recent grades
        const recentGrades = grades.slice(-5).reverse();
        const tableHTML = `
          <table class="data-table">
            <thead>
              <tr><th>Student</th><th>Course</th><th>Grade</th><th>GPA</th><th>Date</th></tr>
            </thead>
            <tbody>
              ${recentGrades.map(g => `
                <tr>
                  <td>${g.first_name} ${g.last_name}</td>
                  <td>${g.course_name}</td>
                  <td>${g.grade || 'N/A'}</td>
                  <td>${(g.gpa || 0).toFixed(2)}</td>
                  <td>${g.recorded_date}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        document.getElementById('recentActivityTable').innerHTML = tableHTML;
      } catch (error) {
        console.error('Error loading dashboard:', error);
      }
    }
  </script>
</body>
</html>
