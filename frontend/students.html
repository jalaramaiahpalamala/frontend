<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>SMS</h2>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="students.html" class="nav-link active">Students</a></li>
        <li><a href="courses.html" class="nav-link">Courses</a></li>
        <li><a href="grades.html" class="nav-link">Grades</a></li>
        <li><a href="attendance.html" class="nav-link">Attendance</a></li>
        <li><a href="reports.html" class="nav-link">Reports</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Students Management</h1>
        </div>
        <div class="top-bar-right">
          <button id="addStudentBtn" class="btn-primary">+ Add Student</button>
        </div>
      </header>

      <div class="content-area">
        <div id="studentForm" class="modal" style="display: none;">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="formTitle">Add New Student</h2>
            <form id="studentFormElement">
              <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" name="student_id" required>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="firstName">First Name</label>
                  <input type="text" id="firstName" name="first_name" required>
                </div>
                <div class="form-group">
                  <label for="lastName">Last Name</label>
                  <input type="text" id="lastName" name="last_name" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                  <label for="phone">Phone</label>
                  <input type="tel" id="phone" name="phone">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="dob">Date of Birth</label>
                  <input type="date" id="dob" name="date_of_birth">
                </div>
                <div class="form-group">
                  <label for="gender">Gender</label>
                  <select id="gender" name="gender">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address">
              </div>
              <div class="form-group">
                <label for="enrollmentDate">Enrollment Date</label>
                <input type="date" id="enrollmentDate" name="enrollment_date" required>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn-primary">Save Student</button>
                <button type="button" class="btn-secondary cancel-btn">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <div class="container">
          <input type="text" id="searchInput" placeholder="Search students..." class="search-input">
          <table id="studentsTable" class="data-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsList">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadStudents();
      setupFormHandlers();
    });

    async function loadStudents() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
        const students = await res.json();
        renderStudents(students);
      } catch (error) {
        console.error('Error loading students:', error);
        document.getElementById('studentsList').innerHTML = '<tr><td colspan="6">Error loading students</td></tr>';
      }
    }

    function renderStudents(students) {
      const tbody = document.getElementById('studentsList');
      tbody.innerHTML = students.map(s => `
        <tr>
          <td>${s.student_id}</td>
          <td>${s.first_name} ${s.last_name}</td>
          <td>${s.email}</td>
          <td>${s.phone || 'N/A'}</td>
          <td><span class="badge ${s.status}">${s.status}</span></td>
          <td>
            <button onclick="editStudent(${s.id})" class="btn-small">Edit</button>
            <button onclick="deleteStudent(${s.id})" class="btn-small btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function setupFormHandlers() {
      const modal = document.getElementById('studentForm');
      const addBtn = document.getElementById('addStudentBtn');
      const closeBtn = document.querySelector('.close');
      const cancelBtn = document.querySelector('.cancel-btn');
      const form = document.getElementById('studentFormElement');

      addBtn.addEventListener('click', () => {
        document.getElementById('formTitle').textContent = 'Add New Student';
        form.reset();
        form.dataset.studentId = '';
        modal.style.display = 'block';
      });

      closeBtn.addEventListener('click', () => modal.style.display = 'none');
      cancelBtn.addEventListener('click', () => modal.style.display = 'none');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('token');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        const studentId = form.dataset.studentId;

        try {
          const method = studentId ? 'PUT' : 'POST';
          const url = studentId ? `/api/students/${studentId}` : '/api/students';
          const res = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (!res.ok) throw new Error('Failed to save student');
          modal.style.display = 'none';
          loadStudents();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      });
    }

    async function editStudent(id) {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/students/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const student = await res.json();

        document.getElementById('formTitle').textContent = 'Edit Student';
        document.getElementById('studentId').value = student.student_id;
        document.getElementById('firstName').value = student.first_name;
        document.getElementById('lastName').value = student.last_name;
        document.getElementById('email').value = student.email;
        document.getElementById('phone').value = student.phone || '';
        document.getElementById('dob').value = student.date_of_birth || '';
        document.getElementById('gender').value = student.gender || '';
        document.getElementById('address').value = student.address || '';
        document.getElementById('enrollmentDate').value = student.enrollment_date;

        document.getElementById('studentFormElement').dataset.studentId = id;
        document.getElementById('studentForm').style.display = 'block';
      } catch (error) {
        alert('Error loading student: ' + error.message);
      }
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/students/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to delete student');
        loadStudents();
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    document.getElementById('searchInput').addEventListener('keyup', async () => {
      const token = localStorage.getItem('token');
      const query = document.getElementById('searchInput').value.toLowerCase();
      const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
      const students = await res.json();
      const filtered = students.filter(s =>
        s.student_id.toLowerCase().includes(query) ||
        `${s.first_name} ${s.last_name}`.toLowerCase().includes(query) ||
        s.email.toLowerCase().includes(query)
      );
      renderStudents(filtered);
    });
  </script>
</body>
</html>
