<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box register-box">
      <h1>Create Account</h1>
      <p class="form-subtitle">Student Management System</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          <small class="form-hint">Your full name</small>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter a username (min 3 characters)" required>
          <small class="form-hint">Minimum 3 characters, no spaces</small>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter a password (min 6 characters)" required>
          <small class="form-hint">Minimum 6 characters</small>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
          <small class="form-hint">Must match the password above</small>
        </div>
        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>
      <p class="login-register">Already have an account? <a href="index.html">Login here</a></p>
      <div id="registerError" class="error-message"></div>
      <div id="registerSuccess" class="success-message"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      
      // Clear messages
      errorDiv.textContent = '';
      errorDiv.style.display = 'none';
      successDiv.textContent = '';
      successDiv.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (!name) {
        showError(errorDiv, 'Please enter your full name');
        return;
      }

      if (name.length < 2) {
        showError(errorDiv, 'Full name must be at least 2 characters');
        return;
      }

      if (username.length < 3) {
        showError(errorDiv, 'Username must be at least 3 characters');
        return;
      }

      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError(errorDiv, 'Username can only contain letters, numbers, and underscores');
        return;
      }

      if (password.length < 6) {
        showError(errorDiv, 'Password must be at least 6 characters');
        return;
      }

      if (password !== confirmPassword) {
        showError(errorDiv, 'Passwords do not match');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Registration failed');
        }

        successDiv.textContent = '✓ Account created successfully! Redirecting to login...';
        successDiv.style.display = 'block';
        
        // Clear form
        document.getElementById('registerForm').reset();

        // Redirect after 2 seconds
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 2000);
      } catch (error) {
        showError(errorDiv, error.message);
      }
    });

    function showError(element, message) {
      element.textContent = '✗ ' + message;
      element.style.display = 'block';
    }
  </script>
</body>
</html>
