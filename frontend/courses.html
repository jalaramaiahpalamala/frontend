<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Student Management System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>SMS</h2>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="students.html" class="nav-link">Students</a></li>
        <li><a href="courses.html" class="nav-link active">Courses</a></li>
        <li><a href="grades.html" class="nav-link">Grades</a></li>
        <li><a href="attendance.html" class="nav-link">Attendance</a></li>
        <li><a href="reports.html" class="nav-link">Reports</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Courses Management</h1>
        </div>
        <div class="top-bar-right">
          <button id="addCourseBtn" class="btn-primary">+ Add Course</button>
        </div>
      </header>

      <div class="content-area">
        <div id="courseForm" class="modal" style="display: none;">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="formTitle">Add New Course</h2>
            <form id="courseFormElement">
              <div class="form-group">
                <label for="courseCode">Course Code</label>
                <input type="text" id="courseCode" name="course_code" required>
              </div>
              <div class="form-group">
                <label for="courseName">Course Name</label>
                <input type="text" id="courseName" name="course_name" required>
              </div>
              <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3"></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="instructor">Instructor</label>
                  <input type="text" id="instructor" name="instructor">
                </div>
                <div class="form-group">
                  <label for="credits">Credits</label>
                  <input type="number" id="credits" name="credits" value="3" min="1" max="6">
                </div>
              </div>
              <div class="form-group">
                <label for="semester">Semester</label>
                <input type="text" id="semester" name="semester" placeholder="e.g., Spring 2024">
              </div>
              <div class="form-actions">
                <button type="submit" class="btn-primary">Save Course</button>
                <button type="button" class="btn-secondary cancel-btn">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <div class="container">
          <input type="text" id="searchInput" placeholder="Search courses..." class="search-input">
          <table id="coursesTable" class="data-table">
            <thead>
              <tr>
                <th>Course Code</th>
                <th>Course Name</th>
                <th>Instructor</th>
                <th>Credits</th>
                <th>Semester</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="coursesList">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadCourses();
      setupFormHandlers();
    });

    async function loadCourses() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/courses', { headers: { 'Authorization': `Bearer ${token}` } });
        const courses = await res.json();
        renderCourses(courses);
      } catch (error) {
        console.error('Error loading courses:', error);
        document.getElementById('coursesList').innerHTML = '<tr><td colspan="6">Error loading courses</td></tr>';
      }
    }

    function renderCourses(courses) {
      const tbody = document.getElementById('coursesList');
      tbody.innerHTML = courses.map(c => `
        <tr>
          <td>${c.course_code}</td>
          <td>${c.course_name}</td>
          <td>${c.instructor || 'N/A'}</td>
          <td>${c.credits || 3}</td>
          <td>${c.semester || 'N/A'}</td>
          <td>
            <button onclick="editCourse(${c.id})" class="btn-small">Edit</button>
            <button onclick="deleteCourse(${c.id})" class="btn-small btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function setupFormHandlers() {
      const modal = document.getElementById('courseForm');
      const addBtn = document.getElementById('addCourseBtn');
      const closeBtn = document.querySelector('.close');
      const cancelBtn = document.querySelector('.cancel-btn');
      const form = document.getElementById('courseFormElement');

      addBtn.addEventListener('click', () => {
        document.getElementById('formTitle').textContent = 'Add New Course';
        form.reset();
        form.dataset.courseId = '';
        modal.style.display = 'block';
      });

      closeBtn.addEventListener('click', () => modal.style.display = 'none');
      cancelBtn.addEventListener('click', () => modal.style.display = 'none');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('token');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        const courseId = form.dataset.courseId;

        try {
          const method = courseId ? 'PUT' : 'POST';
          const url = courseId ? `/api/courses/${courseId}` : '/api/courses';
          const res = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (!res.ok) throw new Error('Failed to save course');
          modal.style.display = 'none';
          loadCourses();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      });
    }

    async function editCourse(id) {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/courses/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const course = await res.json();

        document.getElementById('formTitle').textContent = 'Edit Course';
        document.getElementById('courseCode').value = course.course_code;
        document.getElementById('courseName').value = course.course_name;
        document.getElementById('description').value = course.description || '';
        document.getElementById('instructor').value = course.instructor || '';
        document.getElementById('credits').value = course.credits || 3;
        document.getElementById('semester').value = course.semester || '';

        document.getElementById('courseFormElement').dataset.courseId = id;
        document.getElementById('courseForm').style.display = 'block';
      } catch (error) {
        alert('Error loading course: ' + error.message);
      }
    }

    async function deleteCourse(id) {
      if (!confirm('Are you sure you want to delete this course?')) return;

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/api/courses/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to delete course');
        loadCourses();
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    document.getElementById('searchInput').addEventListener('keyup', async () => {
      const token = localStorage.getItem('token');
      const query = document.getElementById('searchInput').value.toLowerCase();
      const res = await fetch('/api/courses', { headers: { 'Authorization': `Bearer ${token}` } });
      const courses = await res.json();
      const filtered = courses.filter(c =>
        c.course_code.toLowerCase().includes(query) ||
        c.course_name.toLowerCase().includes(query) ||
        (c.instructor && c.instructor.toLowerCase().includes(query))
      );
      renderCourses(filtered);
    });
  </script>
</body>
</html>
